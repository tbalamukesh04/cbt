<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEE Parser MVP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Upload card */
    .upload-card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .upload-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .upload-card p  { font-size: 13px; color: #64748b; margin-bottom: 20px; }
    .upload-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    input[type="file"] {
      font-size: 13px; flex: 1;
      border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 8px 12px; background: #f8fafc; cursor: pointer;
    }

    .btn {
      padding: 9px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: #3b82f6; color: white; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-merge { background: #10b981; color: white; }

    /* Status bar */
    #status {
      font-size: 13px; margin-top: 14px; padding: 10px 14px;
      border-radius: 8px; display: none;
    }
    #status.info    { background: #eff6ff; color: #1d4ed8; display: block; }
    #status.error   { background: #fef2f2; color: #b91c1c; display: block; }
    #status.success { background: #f0fdf4; color: #15803d; display: block; }

    /* Workspace */
    #workspace { display: flex; flex-direction: column; gap: 20px; }

    .q-card {
      background: white; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden;
    }
    .q-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px; font-weight: 700; color: #475569;
      letter-spacing: 0.04em;
    }
    .q-header .section-tag {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      background: #ede9fe; color: #6d28d9;
    }
    .q-body {
      padding: 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .q-body img {
      display: block; max-width: 100%;
      border-radius: 4px; border: 1px solid #e2e8f0;
    }

    /* Answer area */
    .q-answer {
      padding: 12px 16px; border-top: 1px solid #f1f5f9;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .q-answer label {
      font-size: 13px; color: #64748b; font-weight: 600;
    }
    .option-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #cbd5e1; background: white;
      font-size: 14px; font-weight: 700; color: #475569;
      cursor: pointer; transition: all 0.15s;
    }
    .option-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .option-btn.selected {
      background: #3b82f6; border-color: #3b82f6; color: white;
    }
    /* Checkbox style for multiple correct */
    .option-btn.checkbox { border-radius: 6px; }
    .option-btn.checkbox.selected {
      background: #7c3aed; border-color: #7c3aed; color: white;
    }

    .num-input {
      width: 120px; padding: 8px 12px; font-size: 14px;
      border: 2px solid #cbd5e1; border-radius: 8px;
      outline: none; transition: border-color 0.15s;
    }
    .num-input:focus { border-color: #3b82f6; }

    .q-footer {
      display: flex; gap: 10px; padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="upload-card">
    <h1>JEE PDF Parser — MVP</h1>
    <p>Upload a text-based JEE question paper PDF. Questions are rendered as images with full visual fidelity.</p>
    <div class="upload-row">
      <input type="file" id="pdfInput" accept="application/pdf" />
      <button class="btn btn-primary" id="uploadBtn">Upload &amp; Parse</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="workspace"></div>

</div>

<script>
  const API = window.location.origin;
  let questions = [];

  function setStatus(msg, type = "info") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type;
  }

  // ── Answer type labels ──────────────────────────────────────────────
  const TYPE_LABELS = {
    single_correct_mcq:   "Single Correct",
    multiple_correct_mcq: "Multiple Correct",
    integer_type:         "Integer",
    numerical_type:       "Numerical",
  };

  // ── Build answer input for a question ───────────────────────────────
  function buildAnswerUI(q, qi) {
    const answer = document.createElement("div");
    answer.className = "q-answer";
    const aType = q.section ? q.section.answer_type : "single_correct_mcq";

    if (aType === "single_correct_mcq") {
      answer.innerHTML = `<label>Answer:</label>`;
      ["A", "B", "C", "D"].forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        if (q._selected === opt) btn.classList.add("selected");
        btn.addEventListener("click", () => {
          q._selected = opt;
          render();
        });
        answer.appendChild(btn);
      });

    } else if (aType === "multiple_correct_mcq") {
      answer.innerHTML = `<label>Answer (select all):</label>`;
      if (!q._selected_multi) q._selected_multi = {};
      ["A", "B", "C", "D"].forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn checkbox";
        btn.textContent = opt;
        if (q._selected_multi[opt]) btn.classList.add("selected");
        btn.addEventListener("click", () => {
          q._selected_multi[opt] = !q._selected_multi[opt];
          render();
        });
        answer.appendChild(btn);
      });

    } else if (aType === "integer_type") {
      answer.innerHTML = `<label>Answer (integer):</label>`;
      const input = document.createElement("input");
      input.type = "number";
      input.step = "1";
      input.className = "num-input";
      input.placeholder = "e.g. 7";
      input.value = q._num_answer || "";
      input.addEventListener("change", (e) => { q._num_answer = e.target.value; });
      answer.appendChild(input);

    } else if (aType === "numerical_type") {
      answer.innerHTML = `<label>Answer (decimal):</label>`;
      const input = document.createElement("input");
      input.type = "number";
      input.step = "0.01";
      input.className = "num-input";
      input.placeholder = "e.g. 3.14";
      input.value = q._num_answer || "";
      input.addEventListener("change", (e) => { q._num_answer = e.target.value; });
      answer.appendChild(input);
    }

    return answer;
  }

  // ── Render ──────────────────────────────────────────────────────────
  function render() {
    const ws = document.getElementById("workspace");
    ws.innerHTML = "";

    questions.forEach((q, qi) => {
      const card = document.createElement("div");
      card.className = "q-card";

      const aType = q.section ? q.section.answer_type : "single_correct_mcq";
      const typeLabel = TYPE_LABELS[aType] || aType;

      // Header
      const header = document.createElement("div");
      header.className = "q-header";
      header.innerHTML = `
        <span>${q.id.toUpperCase()}</span>
        <span class="section-tag">${typeLabel}</span>
      `;
      card.appendChild(header);

      // Body — question images
      const body = document.createElement("div");
      body.className = "q-body";
      q.images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = `${q.id}`;
        body.appendChild(img);
      });
      card.appendChild(body);

      // Answer area — switches by type
      card.appendChild(buildAnswerUI(q, qi));

      // Footer — merge
      if (qi < questions.length - 1) {
        const footer = document.createElement("div");
        footer.className = "q-footer";
        const mergeBtn = document.createElement("button");
        mergeBtn.className = "btn btn-merge";
        mergeBtn.textContent = "Merge with next ↓";
        mergeBtn.addEventListener("click", () => mergeQuestion(qi));
        footer.appendChild(mergeBtn);
        card.appendChild(footer);
      }

      ws.appendChild(card);
    });
  }

  // ── Mutations ───────────────────────────────────────────────────────
  function mergeQuestion(qi) {
    if (qi >= questions.length - 1) return;
    questions[qi].images = questions[qi].images.concat(questions[qi + 1].images);
    questions[qi]._debug.line_count += questions[qi + 1]._debug.line_count;
    questions.splice(qi + 1, 1);
    questions.forEach((q, i) => q.id = `q${i + 1}`);
    render();
  }

  // ── Upload ──────────────────────────────────────────────────────────
  document.getElementById("uploadBtn").addEventListener("click", async () => {
    const file = document.getElementById("pdfInput").files[0];
    if (!file) { setStatus("Please select a PDF file first.", "error"); return; }

    const btn = document.getElementById("uploadBtn");
    btn.disabled = true;
    btn.textContent = "Parsing…";
    setStatus("Uploading and parsing document…", "info");
    document.getElementById("workspace").innerHTML = "";

    try {
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch(`${API}/upload`, { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Unknown server error.");
      questions = data.questions;
      render();
      setStatus(
        `✓ Parsed ${data.total} question${data.total !== 1 ? "s" : ""}. Use Merge to fix boundaries.`,
        "success"
      );
    } catch (err) {
      setStatus(`✗ ${err.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Upload & Parse";
    }
  });
</script>
</body>
</html>
