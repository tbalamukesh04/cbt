<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEE Parser MVP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Upload card */
    .upload-card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .upload-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .upload-card p  { font-size: 13px; color: #64748b; margin-bottom: 20px; }

    .upload-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    input[type="file"] {
      font-size: 13px; flex: 1;
      border: 1px solid #cbd5e1; border-radius: 8px;
      padding: 8px 12px; background: #f8fafc; cursor: pointer;
    }

    .btn {
      padding: 9px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: #3b82f6; color: white; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-merge { background: #10b981; color: white; }

    /* Status */
    #status { font-size: 13px; margin-top: 14px; padding: 10px 14px; border-radius: 8px; display: none; }
    #status.info    { background: #eff6ff; color: #1d4ed8; display: block; }
    #status.error   { background: #fef2f2; color: #b91c1c; display: block; }
    #status.success { background: #f0fdf4; color: #15803d; display: block; }

    /* Workspace */
    #workspace { display: flex; flex-direction: column; gap: 20px; }

    .q-card {
      background: white; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden;
    }

    /* Section banner */
    .section-banner {
      padding: 10px 16px;
      background: #eef2ff;
      border-bottom: 1px solid #c7d2fe;
    }
    .section-banner .section-name {
      font-size: 13px; font-weight: 800;
      color: #4338ca; letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .section-banner .section-desc {
      font-size: 12px; color: #6366f1;
      margin-top: 2px;
    }
    .section-banner .section-type {
      display: inline-block; margin-top: 4px;
      font-size: 10px; font-weight: 700;
      background: #c7d2fe; color: #3730a3;
      padding: 2px 8px; border-radius: 4px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* Question header */
    .q-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: #f8fafc; border-bottom: 1px solid #e2e8f0;
      font-size: 12px; font-weight: 700; color: #475569;
      letter-spacing: 0.04em;
    }

    .q-body {
      padding: 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .q-body img {
      display: block; max-width: 100%; border-radius: 4px;
      border: 1px solid #e2e8f0;
    }

    /* Answer area */
    .q-answer {
      padding: 12px 16px; border-top: 1px solid #f1f5f9;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .q-answer label { font-size: 13px; color: #64748b; font-weight: 600; }

    .option-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid #cbd5e1; background: white;
      font-size: 14px; font-weight: 700; color: #475569;
      cursor: pointer; transition: all 0.15s;
    }
    .option-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .option-btn.selected { background: #3b82f6; border-color: #3b82f6; color: white; }

    .num-input {
      width: 120px; padding: 8px 12px;
      border: 2px solid #cbd5e1; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      outline: none; transition: border-color 0.15s;
    }
    .num-input:focus { border-color: #3b82f6; }

    .q-footer {
      display: flex; gap: 10px; padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Upload -->
  <div class="upload-card">
    <h1>JEE PDF Parser — MVP</h1>
    <p>Upload a text-based JEE question paper PDF. Questions are rendered as images with full visual fidelity.</p>
    <div class="upload-row">
      <input type="file" id="pdfInput" accept="application/pdf" />
      <button class="btn btn-primary" id="uploadBtn">Upload &amp; Parse</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Questions -->
  <div id="workspace"></div>

</div>

<script>
  const API = window.location.origin;
  let questions = [];

  function setStatus(msg, type = "info") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type;
  }
  function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // Pretty-print answer_type
  function fmtType(t) {
    const map = {
      mcq: "MCQ", single_correct_mcq: "Single Correct",
      multiple_correct_mcq: "Multiple Correct", numerical: "Numerical",
      matrix_match: "Matrix Match", comprehension: "Comprehension",
    };
    return map[t] || t;
  }

  // ── Render ─────────────────────────────────────────────────────────
  function render() {
    const ws = document.getElementById("workspace");
    ws.innerHTML = "";

    let lastSection = null;

    questions.forEach((q, qi) => {
      const card = document.createElement("div");
      card.className = "q-card";

      // Section banner — show when section changes
      const sec = q.section;
      const secKey = sec ? sec.section_name : null;
      if (sec && secKey !== lastSection) {
        lastSection = secKey;
        const banner = document.createElement("div");
        banner.className = "section-banner";
        banner.innerHTML = `
          <div class="section-name">${escHtml(sec.section_name)}</div>
          ${sec.section_description
            ? `<div class="section-desc">${escHtml(sec.section_description)}</div>`
            : ""}
          <span class="section-type">${fmtType(sec.answer_type)}</span>
        `;
        card.appendChild(banner);
      }

      // Header
      const header = document.createElement("div");
      header.className = "q-header";
      header.innerHTML = `
        <span>${q.id.toUpperCase()}</span>
        <span style="color:#94a3b8">${q.images.length} image${q.images.length !== 1 ? "s" : ""}</span>
      `;
      card.appendChild(header);

      // Body — question images
      const body = document.createElement("div");
      body.className = "q-body";
      q.images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = `${q.id} question image`;
        body.appendChild(img);
      });
      card.appendChild(body);

      // Answer area — adapts to answer_type
      const answer = document.createElement("div");
      answer.className = "q-answer";

      if (q.answer_type === "numerical") {
        answer.innerHTML = `<label>Answer:</label>`;
        const inp = document.createElement("input");
        inp.type = "text";
        inp.className = "num-input";
        inp.placeholder = "Enter value";
        inp.value = q._numAnswer || "";
        inp.addEventListener("input", e => { q._numAnswer = e.target.value; });
        answer.appendChild(inp);
      } else if (q.answer_type === "multiple_correct_mcq") {
        answer.innerHTML = `<label>Answer (select all):</label>`;
        q._selected = q._selected || {};
        ["A", "B", "C", "D"].forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "option-btn" + (q._selected[opt] ? " selected" : "");
          btn.textContent = opt;
          btn.addEventListener("click", () => {
            q._selected[opt] = !q._selected[opt];
            render();
          });
          answer.appendChild(btn);
        });
      } else {
        // single_correct_mcq, mcq, or default
        answer.innerHTML = `<label>Answer:</label>`;
        ["A", "B", "C", "D"].forEach(opt => {
          const btn = document.createElement("button");
          btn.className = "option-btn" + (q._selected === opt ? " selected" : "");
          btn.textContent = opt;
          btn.addEventListener("click", () => {
            q._selected = opt;
            render();
          });
          answer.appendChild(btn);
        });
      }
      card.appendChild(answer);

      // Footer
      if (qi < questions.length - 1) {
        const footer = document.createElement("div");
        footer.className = "q-footer";
        const mergeBtn = document.createElement("button");
        mergeBtn.className = "btn btn-merge";
        mergeBtn.textContent = "Merge with next ↓";
        mergeBtn.addEventListener("click", () => mergeQuestion(qi));
        footer.appendChild(mergeBtn);
        card.appendChild(footer);
      }

      ws.appendChild(card);
    });
  }

  // ── Mutations ──────────────────────────────────────────────────────
  function mergeQuestion(qi) {
    if (qi >= questions.length - 1) return;
    questions[qi].images = questions[qi].images.concat(questions[qi + 1].images);
    questions[qi]._debug.line_count += questions[qi + 1]._debug.line_count;
    questions.splice(qi + 1, 1);
    questions.forEach((q, i) => q.id = `q${i + 1}`);
    render();
  }

  // ── Upload ─────────────────────────────────────────────────────────
  document.getElementById("uploadBtn").addEventListener("click", async () => {
    const file = document.getElementById("pdfInput").files[0];
    if (!file) { setStatus("Please select a PDF file first.", "error"); return; }

    const btn = document.getElementById("uploadBtn");
    btn.disabled = true;
    btn.textContent = "Parsing…";
    setStatus("Uploading and parsing document…", "info");
    document.getElementById("workspace").innerHTML = "";

    try {
      const fd = new FormData();
      fd.append("file", file);

      const res = await fetch(`${API}/upload`, { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Unknown server error.");

      questions = data.questions;
      render();
      setStatus(`✓ Parsed ${data.total} question${data.total !== 1 ? "s" : ""}. Use Merge to fix boundaries.`, "success");
    } catch (err) {
      setStatus(`✗ ${err.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Upload & Parse";
    }
  });
</script>
</body>
</html>
