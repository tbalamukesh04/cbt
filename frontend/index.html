<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEE Parser MVP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Upload card */
    .upload-card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .upload-card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .upload-card p  { font-size: 13px; color: #64748b; margin-bottom: 20px; }

    .upload-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    input[type="file"] {
      font-size: 13px;
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 12px;
      background: #f8fafc;
      cursor: pointer;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: #3b82f6; color: white; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-split { background: #f59e0b; color: white; font-size: 11px; padding: 4px 10px; }
    .btn-merge { background: #10b981; color: white; }

    /* Status bar */
    #status {
      font-size: 13px;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
    }
    #status.info    { background: #eff6ff; color: #1d4ed8; display: block; }
    #status.error   { background: #fef2f2; color: #b91c1c; display: block; }
    #status.success { background: #f0fdf4; color: #15803d; display: block; }

    /* Workspace */
    #workspace { display: flex; flex-direction: column; gap: 16px; }

    .q-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .q-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      letter-spacing: 0.04em;
    }
    .q-body { padding: 16px; }

    /* Lines */
    .line-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: background 0.12s;
    }
    .line-wrapper:hover { background: #eff6ff; }
    .line-text {
      flex: 1;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }
    .split-trigger {
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .line-wrapper:hover .split-trigger { opacity: 1; }

    /* Footer actions */
    .q-footer {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Upload -->
  <div class="upload-card">
    <h1>JEE PDF Parser — MVP</h1>
    <p>Upload a text-based JEE question paper PDF. The parser will segment it into individual question blocks.</p>
    <div class="upload-row">
      <input type="file" id="pdfInput" accept="application/pdf" />
      <button class="btn btn-primary" id="uploadBtn">Upload &amp; Parse</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Questions -->
  <div id="workspace"></div>

</div>

<script>
  const API = "http://127.0.0.1:8000";
  let questions = [];   // Live in-memory state

  // ── Helpers ──────────────────────────────────────────────────────────────
  function setStatus(msg, type = "info") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const ws = document.getElementById("workspace");
    ws.innerHTML = "";

    questions.forEach((q, qi) => {
      const lines = q.text.split("\n").filter(l => l.trim() !== "");

      const card = document.createElement("div");
      card.className = "q-card";

      // Header
      card.innerHTML = `
        <div class="q-header">
          <span>${q.id.toUpperCase()}</span>
          <span style="color:#94a3b8">${lines.length} line${lines.length !== 1 ? "s" : ""}</span>
        </div>
      `;

      // Body – one row per line
      const body = document.createElement("div");
      body.className = "q-body";

      lines.forEach((line, li) => {
        const row = document.createElement("div");
        row.className = "line-wrapper";
        row.innerHTML = `
          <span class="line-text">${escHtml(line)}</span>
          ${li < lines.length - 1
            ? `<button class="btn btn-split split-trigger" data-qi="${qi}" data-li="${li}">Split after this line ✂</button>`
            : ""}
        `;
        body.appendChild(row);
      });

      card.appendChild(body);

      // Footer – merge button
      if (qi < questions.length - 1) {
        const footer = document.createElement("div");
        footer.className = "q-footer";
        footer.innerHTML = `
          <button class="btn btn-merge" data-qi="${qi}">Merge with next ↓</button>
        `;
        card.appendChild(footer);
      }

      ws.appendChild(card);
    });

    // ── Event delegation ──
    ws.addEventListener("click", e => {
      const splitBtn = e.target.closest("[data-li]");
      const mergeBtn = e.target.closest("[data-qi]");

      if (splitBtn && splitBtn.dataset.li !== undefined) {
        splitQuestion(Number(splitBtn.dataset.qi), Number(splitBtn.dataset.li));
      } else if (mergeBtn && mergeBtn.dataset.qi !== undefined && !mergeBtn.dataset.li) {
        mergeQuestion(Number(mergeBtn.dataset.qi));
      }
    }, { once: true });   // re-attached on each render()
  }

  // ── Mutations ─────────────────────────────────────────────────────────────
  function splitQuestion(qi, li) {
    const lines = questions[qi].text.split("\n").filter(l => l.trim() !== "");
    const top    = lines.slice(0, li + 1).join("\n");
    const bottom = lines.slice(li + 1).join("\n");

    if (!bottom.trim()) return;   // Nothing to split into

    questions[qi].text = top;
    questions.splice(qi + 1, 0, {
      id: `${questions[qi].id}_split`,
      text: bottom
    });
    render();
  }

  function mergeQuestion(qi) {
    if (qi >= questions.length - 1) return;
    questions[qi].text = questions[qi].text + "\n" + questions[qi + 1].text;
    questions.splice(qi + 1, 1);
    render();
  }

  // ── Upload ────────────────────────────────────────────────────────────────
  document.getElementById("uploadBtn").addEventListener("click", async () => {
    const file = document.getElementById("pdfInput").files[0];
    if (!file) { setStatus("Please select a PDF file first.", "error"); return; }

    const btn = document.getElementById("uploadBtn");
    btn.disabled = true;
    btn.textContent = "Parsing…";
    setStatus("Uploading and parsing document…", "info");
    document.getElementById("workspace").innerHTML = "";

    try {
      const fd  = new FormData();
      fd.append("file", file);

      const res  = await fetch(`${API}/upload`, { method: "POST", body: fd });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || "Unknown server error.");

      questions = data.questions;
      render();
      setStatus(`✓ Parsed ${data.total} question block${data.total !== 1 ? "s" : ""}. Use Split / Merge to fix boundaries.`, "success");
    } catch (err) {
      setStatus(`✗ ${err.message}`, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Upload & Parse";
    }
  });

  // ── Util ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
